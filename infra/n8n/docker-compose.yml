version: "3.8"

services:
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    env_file:
      - .env.n8n
    ports:
      - "5678:5678"
    volumes:
      - ./n8n_data:/home/node/.n8n
    # Если вы хотите использовать внешний Postgres вместо встроенной БД SQLite,
    # раскомментируйте блок postgres ниже и соответствующие переменные окружения
    # в .env.n8n, а также добавьте depends_on:
    #
    # depends_on:
    #   - postgres

  # Опционально: внешний Postgres только для n8n
  # postgres:
  #   image: postgres:16
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_USER: n8n
  #     POSTGRES_PASSWORD: n8n_password
  #     POSTGRES_DB: n8n
  #   volumes:
  #     - ./postgres_data:/var/lib/postgresql/data

volumes:
  n8n_data:
  # postgres_data:

